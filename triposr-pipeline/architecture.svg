<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2235;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252840;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ollamaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2d4a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="500" y="36" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">🤖 MyLLM — Personal AI Stack on Mac 16GB</text>
  <text x="500" y="56" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#6366f1" text-anchor="middle">All tools run 100% locally · No cloud · No subscriptions</text>

  <!-- Ollama Core (center) -->
  <rect x="390" y="80" width="220" height="90" rx="10" fill="url(#ollamaGrad)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="500" y="105" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#60a5fa" text-anchor="middle">🦙 Ollama (Local LLM Engine)</text>
  <text x="500" y="123" font-family="system-ui,sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">mistral:7b · deepseek-coder:6.7b</text>
  <text x="500" y="139" font-family="system-ui,sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">localhost:11434</text>
  <text x="500" y="157" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Apple Silicon MPS · ~4-10GB VRAM</text>

  <!-- Tool 1: Open WebUI -->
  <rect x="30" y="220" width="175" height="95" rx="10" fill="url(#boxGrad)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="117" y="243" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">💬 Open WebUI</text>
  <text x="117" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Chat Interface</text>
  <text x="117" y="276" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">localhost:3000</text>
  <text x="117" y="292" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">+ SearXNG Search</text>
  <text x="117" y="308" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">localhost:8080</text>

  <!-- Tool 2: Quant AI -->
  <rect x="230" y="220" width="175" height="95" rx="10" fill="url(#boxGrad)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="317" y="243" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#4ade80" text-anchor="middle">📈 Quant AI</text>
  <text x="317" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Stock/Crypto Analysis</text>
  <text x="317" y="276" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">FastAPI + ChromaDB</text>
  <text x="317" y="292" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">vectorbt + curl-cffi</text>
  <text x="317" y="308" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">localhost:8000</text>

  <!-- Tool 3: Gmail AI Manager -->
  <rect x="595" y="220" width="175" height="95" rx="10" fill="url(#boxGrad)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="682" y="243" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fbbf24" text-anchor="middle">📬 Gmail AI Manager</text>
  <text x="682" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Email Triage + Reply</text>
  <text x="682" y="276" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Gmail API + Flask</text>
  <text x="682" y="292" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Auto-summarize + Draft</text>
  <text x="682" y="308" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">localhost:5051</text>

  <!-- Tool 4: TripoSR -->
  <rect x="795" y="220" width="175" height="95" rx="10" fill="url(#boxGrad)" stroke="#ec4899" stroke-width="1.5"/>
  <text x="882" y="243" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#f472b6" text-anchor="middle">🧊 TripoSR 3D</text>
  <text x="882" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Image → 3D Mesh</text>
  <text x="882" y="276" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Apple Silicon MPS</text>
  <text x="882" y="292" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">OBJ / GLB export</text>
  <text x="882" y="308" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">localhost:5050</text>

  <!-- Tool 5: Tax AI Social (NEW) -->
  <rect x="412" y="390" width="175" height="110" rx="10" fill="url(#boxGrad)" stroke="#a78bfa" stroke-width="2"/>
  <text x="499" y="413" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#a78bfa" text-anchor="middle">🤖 Tax AI Social</text>
  <text x="499" y="430" font-family="system-ui,sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">★ NEW</text>
  <text x="499" y="447" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">AI Social Media Engine</text>
  <text x="499" y="463" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Instagram · Facebook · TikTok</text>
  <text x="499" y="479" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Compliance + Auto-Post</text>
  <text x="499" y="495" font-family="system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">localhost:5055</text>

  <!-- Arrows from Ollama to tools -->
  <!-- To Open WebUI -->
  <line x1="430" y1="170" x2="190" y2="220" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- To Quant AI -->
  <line x1="450" y1="170" x2="340" y2="220" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- To Gmail AI -->
  <line x1="550" y1="170" x2="660" y2="220" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- To TripoSR -->
  <line x1="580" y1="165" x2="860" y2="220" stroke="#ec4899" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- To Tax AI Social -->
  <line x1="500" y1="170" x2="499" y2="390" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>

  <!-- Mac Hardware bar -->
  <rect x="30" y="525" width="940" height="24" rx="6" fill="#1a1d27" stroke="#2d3148" stroke-width="1"/>
  <text x="500" y="541" font-family="system-ui,sans-serif" font-size="11" fill="#64748b" text-anchor="middle">🖥️ Mac mini / MacBook · Apple Silicon · 16GB RAM · macOS · All 100% Local · No Cloud</text>

</svg>
