<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="box1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="box2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#166534;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="box3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9a3412;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="box4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bgGrad)" rx="16"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="900" height="64" fill="#1e1b4b" rx="16"/>
  <rect x="0" y="48" width="900" height="16" fill="#1e1b4b"/>
  <text x="450" y="22" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#e2e8f0">🧊 TripoSR Pipeline — Apple Silicon 16GB</text>
  <text x="450" y="45" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Idea → LLM Prompt → Stable Diffusion → TripoSR 3D Mesh → OBJ + GLB</text>

  <!-- Accent line -->
  <rect x="0" y="64" width="900" height="3" fill="url(#accentGrad)"/>

  <!-- Step 1: User Idea -->
  <rect x="30" y="110" width="155" height="200" rx="12" fill="url(#box1)" filter="url(#shadow)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="107" y="140" text-anchor="middle" font-family="sans-serif" font-size="28">💡</text>
  <text x="107" y="168" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#a5b4fc">STEP 1</text>
  <text x="107" y="186" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#c7d2fe">User Idea</text>
  <line x1="50" y1="200" x2="165" y2="200" stroke="#4338ca" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="107" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#818cf8">"a shiny red</text>
  <text x="107" y="234" text-anchor="middle" font-family="monospace" font-size="10" fill="#818cf8">sports car"</text>
  <rect x="55" y="248" width="104" height="22" rx="6" fill="#312e81"/>
  <text x="107" y="263" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">Natural Language</text>
  <rect x="55" y="276" width="104" height="22" rx="6" fill="#312e81"/>
  <text x="107" y="291" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5b4fc">Any Concept</text>

  <!-- Arrow 1→2 -->
  <line x1="188" y1="210" x2="218" y2="210" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Ollama LLM -->
  <rect x="220" y="110" width="155" height="200" rx="12" fill="url(#box2)" filter="url(#shadow)" stroke="#10b981" stroke-width="1.5"/>
  <text x="297" y="140" text-anchor="middle" font-family="sans-serif" font-size="28">🧠</text>
  <text x="297" y="168" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#6ee7b7">STEP 2</text>
  <text x="297" y="186" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#a7f3d0">Ollama LLM</text>
  <line x1="240" y1="200" x2="355" y2="200" stroke="#059669" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="297" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399">mistral:7b</text>
  <text x="297" y="234" text-anchor="middle" font-family="monospace" font-size="10" fill="#34d399">deepseek:6.7b</text>
  <rect x="245" y="248" width="104" height="22" rx="6" fill="#166534"/>
  <text x="297" y="263" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">Prompt Engineer</text>
  <rect x="245" y="276" width="104" height="22" rx="6" fill="#166534"/>
  <text x="297" y="291" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">100% Local</text>

  <!-- Arrow 2→3 -->
  <line x1="378" y1="210" x2="408" y2="210" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Stable Diffusion -->
  <rect x="410" y="110" width="155" height="200" rx="12" fill="url(#box3)" filter="url(#shadow)" stroke="#f97316" stroke-width="1.5"/>
  <text x="487" y="140" text-anchor="middle" font-family="sans-serif" font-size="28">🎨</text>
  <text x="487" y="168" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#fdba74">STEP 3</text>
  <text x="487" y="186" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#fed7aa">Stable Diffusion 1.5</text>
  <line x1="430" y1="200" x2="545" y2="200" stroke="#c2410c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="487" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#fb923c">Apple MPS</text>
  <text x="487" y="234" text-anchor="middle" font-family="monospace" font-size="10" fill="#fb923c">512×512 px</text>
  <rect x="435" y="248" width="104" height="22" rx="6" fill="#9a3412"/>
  <text x="487" y="263" text-anchor="middle" font-family="monospace" font-size="9" fill="#fdba74">~30-90s</text>
  <rect x="435" y="276" width="104" height="22" rx="6" fill="#9a3412"/>
  <text x="487" y="291" text-anchor="middle" font-family="monospace" font-size="9" fill="#fdba74">Diffusers 0.37</text>

  <!-- Arrow 3→4 -->
  <line x1="568" y1="210" x2="598" y2="210" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 4: TripoSR -->
  <rect x="600" y="110" width="155" height="200" rx="12" fill="url(#box4)" filter="url(#shadow)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="677" y="140" text-anchor="middle" font-family="sans-serif" font-size="28">🧊</text>
  <text x="677" y="168" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">STEP 4</text>
  <text x="677" y="186" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#bfdbfe">TripoSR Model</text>
  <line x1="620" y1="200" x2="735" y2="200" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="677" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">Apple MPS</text>
  <text x="677" y="234" text-anchor="middle" font-family="monospace" font-size="10" fill="#60a5fa">stabilityai/TripoSR</text>
  <rect x="625" y="248" width="104" height="22" rx="6" fill="#1e3a5f"/>
  <text x="677" y="263" text-anchor="middle" font-family="monospace" font-size="9" fill="#93c5fd">mc_res: 256</text>
  <rect x="625" y="276" width="104" height="22" rx="6" fill="#1e3a5f"/>
  <text x="677" y="291" text-anchor="middle" font-family="monospace" font-size="9" fill="#93c5fd">rembg bg removal</text>

  <!-- Arrow 4→5 -->
  <line x1="758" y1="210" x2="788" y2="210" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Output -->
  <rect x="790" y="110" width="80" height="200" rx="12" fill="#20243a" filter="url(#shadow)" stroke="#10b981" stroke-width="2"/>
  <text x="830" y="145" text-anchor="middle" font-family="sans-serif" font-size="22">📦</text>
  <text x="830" y="168" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#6ee7b7">OUTPUT</text>
  <line x1="805" y1="180" x2="855" y2="180" stroke="#059669" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="830" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#34d399">OBJ</text>
  <text x="830" y="218" text-anchor="middle" font-family="monospace" font-size="11" fill="#34d399">GLB</text>
  <text x="830" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">Quick</text>
  <text x="830" y="254" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">Look</text>
  <text x="830" y="272" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">Blender</text>
  <text x="830" y="287" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">Reality</text>
  <text x="830" y="301" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac">Composer</text>

  <!-- Bottom bar: tech stack -->
  <rect x="30" y="335" width="840" height="60" rx="10" fill="#1a1d2e" stroke="#2d3155" stroke-width="1"/>
  <text x="450" y="358" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#94a3b8">TECH STACK</text>

  <!-- Tags -->
  <rect x="50" y="365" width="100" height="20" rx="5" fill="#312e81"/>
  <text x="100" y="379" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc">PyTorch 2.10 MPS</text>

  <rect x="162" y="365" width="100" height="20" rx="5" fill="#312e81"/>
  <text x="212" y="379" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc">Python 3.11</text>

  <rect x="274" y="365" width="100" height="20" rx="5" fill="#166534"/>
  <text x="324" y="379" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">Ollama Local LLM</text>

  <rect x="386" y="365" width="100" height="20" rx="5" fill="#9a3412"/>
  <text x="436" y="379" text-anchor="middle" font-family="monospace" font-size="10" fill="#fdba74">Diffusers 0.37</text>

  <rect x="498" y="365" width="100" height="20" rx="5" fill="#1e3a5f"/>
  <text x="548" y="379" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">torchmcubes</text>

  <rect x="610" y="365" width="100" height="20" rx="5" fill="#1e3a5f"/>
  <text x="660" y="379" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">trimesh / rembg</text>

  <rect x="722" y="365" width="120" height="20" rx="5" fill="#292524"/>
  <text x="782" y="379" text-anchor="middle" font-family="monospace" font-size="10" fill="#d6d3d1">Flask Web UI :5050</text>

  <!-- Apple Silicon badge -->
  <rect x="370" y="88" width="160" height="22" rx="11" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
  <text x="450" y="103" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc">🍎 Apple Silicon 16GB · No Cloud · No GPU</text>
</svg>
