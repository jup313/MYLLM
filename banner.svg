<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 220" width="1100" height="220">
  <defs>
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050812;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1340;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c7d2fe" />
      <stop offset="40%" style="stop-color:#ffffff" />
      <stop offset="100%" style="stop-color:#fbcfe8" />
    </linearGradient>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Star/dot pattern -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#6366f1" opacity="0.25"/>
      <circle cx="0" cy="0" r="0.5" fill="#818cf8" opacity="0.15"/>
      <circle cx="40" cy="40" r="0.5" fill="#818cf8" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1100" height="220" fill="url(#bgMain)" rx="16"/>
  <!-- Dot grid overlay -->
  <rect width="1100" height="220" fill="url(#dots)" rx="16" opacity="0.6"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="110" rx="180" ry="80" fill="#6366f1" opacity="0.06"/>
  <ellipse cx="900" cy="110" rx="180" ry="80" fill="#ec4899" opacity="0.06"/>
  <ellipse cx="550" cy="110" rx="200" ry="60" fill="#7c3aed" opacity="0.05"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1100" height="3" fill="url(#glowLine)" rx="16" opacity="0.9"/>

  <!-- Mac chip badge -->
  <rect x="38" y="30" width="130" height="30" rx="8" fill="#1e1a3f" stroke="#6366f1" stroke-width="1.2"/>
  <text x="103" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#818cf8" text-anchor="middle">🍎 Apple Silicon</text>

  <!-- No cloud badge -->
  <rect x="178" y="30" width="100" height="30" rx="8" fill="#1a0e0e" stroke="#ef4444" stroke-width="1.2"/>
  <text x="228" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#f87171" text-anchor="middle">☁️ No Cloud</text>

  <!-- 100% Private badge -->
  <rect x="288" y="30" width="120" height="30" rx="8" fill="#0a1e12" stroke="#22c55e" stroke-width="1.2"/>
  <text x="348" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#4ade80" text-anchor="middle">🔒 100% Private</text>

  <!-- 16 GB badge -->
  <rect x="418" y="30" width="100" height="30" rx="8" fill="#0a1220" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="468" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#60a5fa" text-anchor="middle">💾 16 GB RAM</text>

  <!-- 7 Tools badge -->
  <rect x="528" y="30" width="90" height="30" rx="8" fill="#160a20" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="573" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#c4b5fd" text-anchor="middle">🛠 7 Tools</text>

  <!-- Free badge -->
  <rect x="628" y="30" width="100" height="30" rx="8" fill="#0f1a0a" stroke="#84cc16" stroke-width="1.2"/>
  <text x="678" y="50" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="700" fill="#a3e635" text-anchor="middle">💵 $0 / month</text>

  <!-- ★ Main title -->
  <text x="550" y="118" font-family="system-ui,-apple-system,'SF Pro Display',sans-serif" font-size="42" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" filter="url(#titleGlow)">🤖 MyLLM</text>
  <text x="550" y="148" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="600" fill="#94a3b8" text-anchor="middle">Personal AI Stack on Your Mac</text>

  <!-- Subtitle tool pills row -->
  <text x="550" y="178" font-family="system-ui,sans-serif" font-size="11" fill="#475569" text-anchor="middle">Ollama · Open WebUI · Quant AI · Gmail AI · TripoSR 3D · Tax AI Social · Stable Diffusion · Whisper STT</text>

  <!-- Bottom accent line -->
  <rect x="0" y="217" width="1100" height="3" fill="url(#glowLine)" opacity="0.6"/>

  <!-- GitHub link hint -->
  <text x="1062" y="50" font-family="system-ui,sans-serif" font-size="10" fill="#334155" text-anchor="end">github.com/jup313/MYLLM</text>

  <!-- Decorative circuit nodes -->
  <circle cx="50" cy="170" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="80" cy="155" r="2" fill="#818cf8" opacity="0.3"/>
  <line x1="50" y1="170" x2="80" y2="155" stroke="#6366f1" stroke-width="0.8" opacity="0.2"/>
  <circle cx="1050" cy="170" r="3" fill="#ec4899" opacity="0.4"/>
  <circle cx="1020" cy="155" r="2" fill="#f472b6" opacity="0.3"/>
  <line x1="1050" y1="170" x2="1020" y2="155" stroke="#ec4899" stroke-width="0.8" opacity="0.2"/>
</svg>
